name: Test and Build Releases

on:
  push:
    branches: [main]
    paths:
      - "**.py"
      - "pyproject.toml"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  test-core-mobile:
    name: Test core and mobile code on Ubuntu
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Compile application modules
        run: python -m compileall -q src weather_helper.py weather_helper_mobile.py

      - name: Run non-GUI tests
        run: python -m pytest -m "not windows_gui"

  test-windows:
    name: Test complete suite on Windows
    # Real Tkinter widgets need the Windows runner; this job also runs shared tests.
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

  version:
    name: Determine release version
    needs: [test-core-mobile, test-windows]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
      tag: ${{ steps.semver.outputs.tag }}

    steps:
      - name: Check out repository and tags
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Calculate next semantic version
        id: semver
        shell: bash
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          existing_tag="$(git tag --points-at "$GITHUB_SHA" --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n 1)"
          if [[ -n "$existing_tag" ]]; then
            echo "version=${existing_tag#v}" >> "$GITHUB_OUTPUT"
            echo "tag=$existing_tag" >> "$GITHUB_OUTPUT"
            echo "Reusing $existing_tag for this commit"
            exit 0
          fi

          latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n 1)"
          message="${COMMIT_MESSAGE:-$(git log -1 --pretty=%B "$GITHUB_SHA")}"

          if [[ -z "$latest_tag" ]]; then
            new_version="1.0.0"
          else
            version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "$version"
            message="${message,,}"

            if [[ "$message" == breaking:* || "$message" == *"[major]"* ]]; then
              major=$((major + 1))
              minor=0
              patch=0
            elif [[ "$message" == feat:* || "$message" == *"[minor]"* ]]; then
              minor=$((minor + 1))
              patch=0
            else
              patch=$((patch + 1))
            fi

            new_version="$major.$minor.$patch"
          fi

          echo "version=$new_version" >> "$GITHUB_OUTPUT"
          echo "tag=v$new_version" >> "$GITHUB_OUTPUT"
          echo "Preparing release v$new_version"

  build-windows:
    name: Build Windows executable
    needs: version
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Windows build dependencies
        run: python -m pip install -e ".[windows-build]"

      - name: Build executable
        run: pyinstaller --onefile --windowed --name weather-helper weather_helper.py

      - name: Package executable
        shell: pwsh
        run: |
          $archive = "dist\weather-helper-windows-${{ needs.version.outputs.version }}.zip"
          Compress-Archive -Path "dist\weather-helper.exe" -DestinationPath $archive

      - name: Verify ZIP contents
        shell: pwsh
        run: |
          $archive = Get-Item "dist\weather-helper-windows-*.zip"
          $verifyDir = Join-Path $env:RUNNER_TEMP "weather-helper-zip"
          Expand-Archive -LiteralPath $archive.FullName -DestinationPath $verifyDir
          $files = @(Get-ChildItem -LiteralPath $verifyDir -Recurse -File)
          if ($files.Count -ne 1 -or $files[0].Name -ne "weather-helper.exe") {
            throw "Windows archive must contain exactly weather-helper.exe. Found: $($files.FullName -join ', ')"
          }

      - name: Smoke test packaged executable startup
        shell: pwsh
        run: |
          $executable = (Resolve-Path "dist\weather-helper.exe").Path
          $process = Start-Process -FilePath $executable -PassThru -WindowStyle Hidden
          try {
            if ($process.WaitForExit(10000)) {
              throw "Packaged application exited during the 10-second startup smoke test (exit code $($process.ExitCode))."
            }
            Write-Host "Packaged application remained running for 10 seconds."
          }
          finally {
            if (-not $process.HasExited) {
              Stop-Process -Id $process.Id -Force
            }
          }

      - name: Report Windows signing status
        run: echo "::warning::The Windows executable is unsigned until a trusted code-signing certificate is configured."

      - name: Upload Windows workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: weather-helper-windows
          path: dist/weather-helper-windows-*.zip
          if-no-files-found: error

  build-android:
    name: Build Android APK
    needs: version
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
    outputs:
      signing: ${{ steps.signing-mode.outputs.mode }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Restore Flet and Android build caches
        uses: actions/cache@v5
        with:
          path: |
            ~/.flet
            ~/flutter
            ~/.pub-cache
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-flet-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-flet-

      - name: Install Android build dependencies
        run: python -m pip install -e ".[mobile]"

      - name: Configure stable Android signing
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        shell: bash
        run: |
          if [[ -z "$ANDROID_KEYSTORE_PASSWORD" || -z "$ANDROID_KEY_PASSWORD" || -z "$ANDROID_KEY_ALIAS" ]]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 is set, but one or more Android signing secrets are missing."
            exit 1
          fi

          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/weather-helper-release.jks"
          echo "FLET_ANDROID_SIGNING_KEY_STORE=$RUNNER_TEMP/weather-helper-release.jks" >> "$GITHUB_ENV"
          echo "FLET_ANDROID_SIGNING_KEY_STORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "FLET_ANDROID_SIGNING_KEY_PASSWORD=$ANDROID_KEY_PASSWORD" >> "$GITHUB_ENV"
          echo "FLET_ANDROID_SIGNING_KEY_ALIAS=$ANDROID_KEY_ALIAS" >> "$GITHUB_ENV"

      - name: Warn when stable signing is not configured
        if: env.ANDROID_KEYSTORE_BASE64 == ''
        run: echo "::warning::Android signing secrets are absent. The APK will be debug-signed and may not update a previous CI build."

      - name: Record signing mode
        id: signing-mode
        shell: bash
        run: |
          if [[ -n "$ANDROID_KEYSTORE_BASE64" ]]; then
            echo "mode=release" >> "$GITHUB_OUTPUT"
          else
            echo "mode=debug" >> "$GITHUB_OUTPUT"
          fi

      - name: Build APK
        run: |
          flet build apk \
            --yes \
            --no-rich-output \
            --build-number "${{ github.run_number }}" \
            --build-version "${{ needs.version.outputs.version }}"

      - name: Give APK a versioned name
        shell: bash
        run: |
          mkdir -p dist
          cp build/apk/weather-helper.apk "dist/weather-helper-android-${{ needs.version.outputs.version }}.apk"

      - name: Verify APK package metadata and signature
        shell: bash
        run: |
          sdk_root=""
          for candidate in "$ANDROID_HOME" "$ANDROID_SDK_ROOT" "$HOME/Android/sdk" "$HOME/Android/Sdk"; do
            if [[ -n "$candidate" && -d "$candidate/build-tools" ]]; then
              sdk_root="$candidate"
              break
            fi
          done
          if [[ -z "$sdk_root" ]]; then
            echo "::error::Could not locate Android SDK build-tools after the Flet build."
            exit 1
          fi

          aapt="$(find "$sdk_root/build-tools" -type f -name aapt | sort -V | tail -n 1)"
          apksigner="$(find "$sdk_root/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          if [[ ! -x "$aapt" || ! -x "$apksigner" ]]; then
            echo "::error::Android aapt or apksigner was not found under $sdk_root/build-tools."
            exit 1
          fi

          if ! command -v java >/dev/null 2>&1; then
            for candidate in "$JAVA_HOME" "$HOME"/java/*; do
              if [[ -n "$candidate" && -x "$candidate/bin/java" ]]; then
                export JAVA_HOME="$candidate"
                export PATH="$JAVA_HOME/bin:$PATH"
                break
              fi
            done
          fi
          if ! command -v java >/dev/null 2>&1; then
            echo "::error::Java was not available for apksigner verification."
            exit 1
          fi

          apk="dist/weather-helper-android-${{ needs.version.outputs.version }}.apk"
          metadata="$RUNNER_TEMP/weather-helper-apk-metadata.txt"
          "$aapt" dump badging "$apk" | tee "$metadata"
          grep -F "package: name='com.maximbk.weatherhelper'" "$metadata"
          grep -F "versionName='${{ needs.version.outputs.version }}'" "$metadata"
          "$apksigner" verify --verbose --print-certs "$apk"

      - name: Upload Android workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: weather-helper-android
          path: dist/weather-helper-android-*.apk
          if-no-files-found: error
          compression-level: 0

  release:
    name: Publish GitHub release
    needs: [version, build-windows, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: weather-helper-*
          path: release-assets
          merge-multiple: true

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          cd release-assets
          sha256sum weather-helper-* > SHA256SUMS
          cat SHA256SUMS

      - name: Publish release with Windows and Android downloads
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Weather Helper ${{ needs.version.outputs.tag }}
          generate_release_notes: true
          body: |
            Downloads:
            - `weather-helper-windows-*.zip` — Windows desktop application
            - `weather-helper-android-*.apk` — Android application for sideloading
            - `SHA256SUMS` — SHA-256 checksums for both downloads

            Signing status:
            - Windows: unsigned; Windows may show an unknown-publisher warning until a trusted certificate is configured.
            - Android: `${{ needs.build-android.outputs.signing }}` signed. `debug` signing is for personal testing and may prevent updates between CI runs; stable release signing requires the repository secrets documented in the Android guide.
          files: release-assets/*
