name: Test and Build Releases

on:
  push:
    branches: [main]
    paths:
      - "**.py"
      - "pyproject.toml"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  test:
    name: Test shared application code
    # The suite includes real Tkinter widget tests, so use the Windows runner.
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

  version:
    name: Determine release version
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
      tag: ${{ steps.semver.outputs.tag }}

    steps:
      - name: Check out repository and tags
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Calculate next semantic version
        id: semver
        shell: bash
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n 1)"

          if [[ -z "$latest_tag" ]]; then
            new_version="1.0.0"
          else
            version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "$version"
            message="${COMMIT_MESSAGE,,}"

            if [[ "$message" == breaking:* || "$message" == *"[major]"* ]]; then
              major=$((major + 1))
              minor=0
              patch=0
            elif [[ "$message" == feat:* || "$message" == *"[minor]"* ]]; then
              minor=$((minor + 1))
              patch=0
            else
              patch=$((patch + 1))
            fi

            new_version="$major.$minor.$patch"
          fi

          echo "version=$new_version" >> "$GITHUB_OUTPUT"
          echo "tag=v$new_version" >> "$GITHUB_OUTPUT"
          echo "Preparing release v$new_version"

  build-windows:
    name: Build Windows executable
    needs: version
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Windows build dependencies
        run: python -m pip install -e ".[windows-build]"

      - name: Build executable
        run: pyinstaller --onefile --windowed --name weather-helper weather_helper.py

      - name: Package executable
        shell: pwsh
        run: |
          $archive = "dist\weather-helper-windows-${{ needs.version.outputs.version }}.zip"
          Compress-Archive -Path "dist\weather-helper.exe" -DestinationPath $archive

      - name: Upload Windows workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: weather-helper-windows
          path: dist/weather-helper-windows-*.zip
          if-no-files-found: error

  build-android:
    name: Build Android APK
    needs: version
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Restore Flet and Android build caches
        uses: actions/cache@v5
        with:
          path: |
            ~/.flet
            ~/flutter
            ~/.pub-cache
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-flet-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-flet-

      - name: Install Android build dependencies
        run: python -m pip install -e ".[mobile]"

      - name: Configure stable Android signing
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        shell: bash
        run: |
          if [[ -z "$ANDROID_KEYSTORE_PASSWORD" || -z "$ANDROID_KEY_PASSWORD" || -z "$ANDROID_KEY_ALIAS" ]]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 is set, but one or more Android signing secrets are missing."
            exit 1
          fi

          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/weather-helper-release.jks"
          echo "FLET_ANDROID_SIGNING_KEY_STORE=$RUNNER_TEMP/weather-helper-release.jks" >> "$GITHUB_ENV"
          echo "FLET_ANDROID_SIGNING_KEY_STORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "FLET_ANDROID_SIGNING_KEY_PASSWORD=$ANDROID_KEY_PASSWORD" >> "$GITHUB_ENV"
          echo "FLET_ANDROID_SIGNING_KEY_ALIAS=$ANDROID_KEY_ALIAS" >> "$GITHUB_ENV"

      - name: Warn when stable signing is not configured
        if: env.ANDROID_KEYSTORE_BASE64 == ''
        run: echo "::warning::Android signing secrets are absent. The APK will be debug-signed and may not update a previous CI build."

      - name: Build APK
        run: |
          flet build apk \
            --yes \
            --no-rich-output \
            --build-number "${{ github.run_number }}" \
            --build-version "${{ needs.version.outputs.version }}"

      - name: Give APK a versioned name
        shell: bash
        run: |
          mkdir -p dist
          cp build/apk/weather-helper.apk "dist/weather-helper-android-${{ needs.version.outputs.version }}.apk"

      - name: Upload Android workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: weather-helper-android
          path: dist/weather-helper-android-*.apk
          if-no-files-found: error
          compression-level: 0

  release:
    name: Publish GitHub release
    needs: [version, build-windows, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: weather-helper-*
          path: release-assets
          merge-multiple: true

      - name: Publish release with Windows and Android downloads
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Weather Helper ${{ needs.version.outputs.tag }}
          generate_release_notes: true
          body: |
            Downloads:
            - `weather-helper-windows-*.zip` — Windows desktop application
            - `weather-helper-android-*.apk` — Android application for sideloading
          files: release-assets/*
